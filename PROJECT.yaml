schema: project
schema_version: 1

current_understanding:
  summary: "This repository maintains and distributes portable development-methodology skills, conceptual agent definitions, generated runtime adapters, design documentation, validation scripts, and evaluation fixtures."
  development_stage: "Active bundle maintenance with generated documentation, native agent adapters, regression tests, and explicit target deployment support."
  setup_need: "Python maintenance code exists in several ownership scopes, including a FastAPI fixture, so ordinary agents need deterministic folder technology skillsets without rerunning detection."

authoritative_sources:
  readme_files:
    - path: README.md
      evidence: "Defines the bundle purpose, repository shape, generation workflow, explicit target deployment workflow, and verification commands."
  agents_files:
    - path: AGENTS.md
      evidence: "Defines repository-local source boundaries, catalog maintenance rules, generated-file ownership, validation commands, and commit expectations."
  package_and_build_files:
    - path: evals/projects/python-inventory/pyproject.toml
      evidence: "Declares the plain-Python inventory fixture and Python 3.11 or newer."
    - path: evals/projects/fastapi-orders/pyproject.toml
      evidence: "Declares the FastAPI evaluation fixture and its FastAPI dependency."
  source_roots:
    - path: scripts
      evidence: "Contains Python maintenance, generation, installation, detection, evaluation, and regression-test tooling."
    - path: skills/project-wiki/scripts
      evidence: "Contains the Python project-wiki command implementation and its unit tests."
    - path: skills/detect-technology-skills/scripts
      evidence: "Contains the generated portable Python detector mirror."
    - path: evals/projects/python-inventory
      evidence: "Contains a plain-Python evaluation fixture."
    - path: evals/projects/fastapi-orders
      evidence: "Contains a FastAPI evaluation fixture with its own owning manifest."
  test_roots:
    - path: scripts
      evidence: "Contains the repository regression tests run by Python unittest discovery."
    - path: skills/project-wiki/scripts
      evidence: "Contains the project-wiki Python unit tests run with the project_wiki_ops package on PYTHONPATH."
  documentation:
    - path: design
      evidence: "Contains the generated and hand-maintained explanations of the skill, agent, adapter, and operating models."
    - path: backlog/feature-backlog
      evidence: "Contains tracked methodology lifecycle backlog material."

project_scope_and_boundaries:
  repository_boundary: "The dev-methodology Git repository and its source-controlled bundle, generated artifacts, tests, evaluation fixtures, and setup documentation."
  product_or_service_boundary: "A portable Agent Skills and conceptual agent definition bundle rather than one deployed application service."
  private_data_boundary: "Do not send PII or company-internal information to an LLM unless explicitly instructed. Keep customer-specific material out of distributable skills, conceptual agent definitions, examples, and generated adapters."
  sibling_repositories:
    - name: "Not yet identified"
      relationship: "No sibling repository is required to determine the Python folder skillsets in this plan."

project_taxonomy:
  family: "Portable development-methodology skill and agent bundle"
  primary_runtime: "Python 3 for maintenance and test tooling, with Markdown, YAML, HTML, JavaScript data, and native agent definitions as maintained artifacts."
  application_tiers:
    - name: "Bundle source and conceptual agent definitions"
      paths:
        - skills/**
        - agents/**
        - adapters/**
      stacks:
        - "Agent Skills"
        - YAML
        - Markdown
      notes: "These are product source files; Python skillsets apply only to executable Python subtrees within them."
    - name: "Repository maintenance automation"
      paths:
        - scripts/**
      stacks:
        - Python
        - unittest
        - PyYAML
      notes: "Use python for implementation, review, diagnosis, verification, and technical documentation in this scope."
    - name: "Project-wiki tooling"
      paths:
        - skills/project-wiki/scripts/**
      stacks:
        - Python
        - unittest
      notes: "This is a Python CLI implementation; the Node.js node-cli skill is not applicable."
    - name: "Technology detector mirror"
      paths:
        - skills/detect-technology-skills/scripts/**
      stacks:
        - Python
      notes: "Use python and preserve generated-mirror ownership rules."
    - name: "Python evaluation fixtures"
      paths:
        - evals/projects/python-inventory/**
        - evals/projects/fastapi-orders/**
      stacks:
        - Python
        - FastAPI
      notes: "The plain fixture uses python; the independently owned FastAPI fixture also uses fastapi."
    - name: "Documentation and generated views"
      paths:
        - README.md
        - backlog/**
        - design/**
        - docs/**
        - generated/**
      stacks:
        - Markdown
        - HTML
        - generated JavaScript data
        - native agent formats
      notes: "Follow repository documentation and generated-file rules; do not apply Python skillsets merely because Python generators produce some artifacts."
  documentation_surfaces:
    - path: README.md
      purpose: "Human-facing bundle entry point, inventory, setup workflow, and verification guide."
    - path: AGENTS.md
      purpose: "Operational maintenance contract and folder technology-skill routing loaded by agents."
    - path: design
      purpose: "Maintained and generated explanations of the methodology operating model."
    - path: backlog/feature-backlog
      purpose: "Tracked methodology lifecycle backlog."

root_agents_reference:
  file: AGENTS.md
  purpose: "Tell agents how to maintain source files and generated outputs, which checks to run, and which Python technology skills must be loaded for each executable scope."
  required_content:
    - "Repository-wide source boundaries, privacy constraints, generation ownership, validation commands, and commit expectations."
    - "Unconditional folder technology skillsets generated from this plan and their required-load failure policy."

technology_skill_detection:
  owner: "Project Configurator"
  registry: skills/detect-technology-skills/references/technology-skill-detection-registry.yaml
  selection_policy: "Setup-agent-selected folder scopes and deterministic repository evidence. The selected conceptual agent definition, prompt wording, read confirmation, and optional local commands are not detector inputs."
  required_load_failure: BLOCKED
  missing_variant_policy: "Record an explicit no-variant skillset."
  runtime_policy: "Ordinary agents load the technology skills declared by the nearest AGENTS.md before acting and do not rerun detection."

claude_bridge_files:
  enabled: false
  root_file: "Not applicable"
  import_target: "Not applicable"
  nested_files: []
  rule: "Create a thin CLAUDE.md importing the colocated AGENTS.md only if this repository adopts project-local Claude Code guidance."

role_agent_set:
  - role: methodology-maintainer
    purpose: "Keep source skills, conceptual agent definitions, metadata, generated outputs, documentation, tests, and explicit deployment behavior aligned."
    owns:
      - "Distributed methodology bundle maintenance."
    hands_off:
      - "Methodology artifact review to methodology-artifact-reviewer when a separate documentation review is required."
    skills:
      - agent-claim
      - maintain-methodology-documentation
      - development-methodology
      - structured-explanation
    completion_checks:
      - "Run all validation commands required by AGENTS.md."
  - role: project-configurator
    purpose: "Own PROJECT.yaml, setup-time technology detection, and deterministic AGENTS.md folder routing."
    owns:
      - "Conceptual agent definition and technology skill setup."
    hands_off:
      - "Ordinary implementation to dev-coder after routing is established."
    skills:
      - agent-claim
      - detect-technology-skills
      - create-project-configuration
      - development-methodology
      - documentation-page-verify
    completion_checks:
      - "Rerun representative-scope detection and compare AGENTS.md with this plan."
  - role: dev-coder
    purpose: "Implement scoped source changes under repository and folder technology guidance."
    owns:
      - "Source patches and focused regression coverage."
    hands_off:
      - "Independent review to dev-code-reviewer and verification to dev-verifier."
    skills:
      - agent-claim
      - careful-coding
      - code-comments
      - code-discovery
      - fix-explanation
    completion_checks:
      - "Run the focused and repository-level checks applicable to the changed scope."
  - role: dev-code-reviewer
    purpose: "Review changed code and generated effects from a fresh read-only context."
    owns:
      - "Evidence-backed prioritized code findings."
    hands_off:
      - "Corrections to dev-coder."
    skills:
      - code-review-evidence
      - review-structured-artifact
      - careful-coding
      - code-comments
    completion_checks:
      - "Load each folder technology skill and its review checklist before synthesis."
  - role: dev-verifier
    purpose: "Run project-native checks and report coverage, omissions, and residual risk."
    owns:
      - "Validation command results and coverage evidence."
    hands_off:
      - "Reproducible implementation defects to dev-coder."
    skills:
      - test-strategy
      - review-structured-artifact
      - structured-explanation
    completion_checks:
      - "Run applicable commands from AGENTS.md without weakening gates."

technology_skill_loadouts:
  - scope: "Repository maintenance automation"
    pathPattern: scripts/**
    skills:
      - python
    sourceEvidence:
      - skill: python
        evidence:
          - "Python source evidence: scripts/build-agent-skill-hierarchy.py and sibling .py files"
    missingRequiredSkills: []
    exclusiveConflicts: []
    status: READY
    required_load_failure: BLOCKED
    local_rules_source: AGENTS.md
    notes: "The detector's fastapi match came only from FastAPI test text in scripts/test_technology_detection.py and was rejected because scripts is not a FastAPI runtime scope."
  - scope: "Project-wiki Python tooling"
    pathPattern: skills/project-wiki/scripts/**
    skills:
      - python
    sourceEvidence:
      - skill: python
        evidence:
          - "Python package evidence: skills/project-wiki/scripts/project_wiki_ops/__init__.py and sibling .py files"
    missingRequiredSkills: []
    exclusiveConflicts: []
    status: READY
    required_load_failure: BLOCKED
    local_rules_source: AGENTS.md
    notes: "The detector returns only python. Node CLI activation requires a Node-owned JavaScript or TypeScript CLI path, so project_wiki_ops/cli.py does not activate node-cli."
  - scope: "Technology detector mirror"
    pathPattern: skills/detect-technology-skills/scripts/**
    skills:
      - python
    sourceEvidence:
      - skill: python
        evidence:
          - "Python source evidence: skills/detect-technology-skills/scripts/detect.py"
    missingRequiredSkills: []
    exclusiveConflicts: []
    status: READY
    required_load_failure: BLOCKED
    local_rules_source: AGENTS.md
    notes: "This source is a generated portable mirror and must stay aligned with the repository detector builder."
  - scope: "Plain-Python evaluation fixture"
    pathPattern: evals/projects/python-inventory/**
    skills:
      - python
    sourceEvidence:
      - skill: python
        evidence:
          - "Python source evidence: evals/projects/python-inventory/src/inventory.py"
          - "Owning manifest evidence: evals/projects/python-inventory/pyproject.toml requires Python 3.11 or newer"
    missingRequiredSkills: []
    exclusiveConflicts: []
    status: READY
    required_load_failure: BLOCKED
    local_rules_source: AGENTS.md
    notes: "No narrower framework variant was detected."
  - scope: "FastAPI evaluation fixture"
    pathPattern: evals/projects/fastapi-orders/**
    skills:
      - fastapi
      - python
    sourceEvidence:
      - skill: fastapi
        evidence:
          - "Owning manifest dependency: evals/projects/fastapi-orders/pyproject.toml declares fastapi"
          - "Framework source evidence: evals/projects/fastapi-orders/app/main.py imports FastAPI and declares an application route"
      - skill: python
        evidence:
          - "Python source evidence: evals/projects/fastapi-orders/app/main.py"
    missingRequiredSkills: []
    exclusiveConflicts: []
    status: READY
    required_load_failure: BLOCKED
    local_rules_source: AGENTS.md
    notes: "Load both skills because fastapi explicitly composes with python."

folder_routing:
  - pattern: scripts/**
    tier_or_workflow: "Repository maintenance automation"
    primary_role: dev-coder
    required_skills:
      - python
    source_evidence:
      - path: scripts
        fact: "The subtree contains Python implementation and unittest files."
    verification_commands:
      - "python3 -m unittest discover scripts"
    nested_agents_file_needed: false
    nested_agents_file_path: "Not applicable"
  - pattern: skills/project-wiki/scripts/**
    tier_or_workflow: "Project-wiki Python tooling"
    primary_role: dev-coder
    required_skills:
      - python
    source_evidence:
      - path: skills/project-wiki/scripts
        fact: "The subtree contains the project_wiki_ops Python package and its tests."
    verification_commands:
      - "PYTHONPATH=skills/project-wiki/scripts python3 -m unittest discover skills/project-wiki/scripts"
    nested_agents_file_needed: false
    nested_agents_file_path: "Not applicable"
  - pattern: skills/detect-technology-skills/scripts/**
    tier_or_workflow: "Technology detector mirror"
    primary_role: dev-coder
    required_skills:
      - python
    source_evidence:
      - path: skills/detect-technology-skills/scripts/detect.py
        fact: "The detector mirror is Python source generated from the repository setup detector."
    verification_commands:
      - "python3 scripts/build-technology-detection.py --check"
    nested_agents_file_needed: false
    nested_agents_file_path: "Not applicable"
  - pattern: evals/projects/python-inventory/**
    tier_or_workflow: "Plain-Python evaluation fixture"
    primary_role: dev-coder
    required_skills:
      - python
    source_evidence:
      - path: evals/projects/python-inventory/pyproject.toml
        fact: "The independently owned fixture requires Python 3.11 or newer."
    verification_commands:
      - "python3 -m compileall -q evals/projects/python-inventory/src"
    nested_agents_file_needed: false
    nested_agents_file_path: "Not applicable"
  - pattern: evals/projects/fastapi-orders/**
    tier_or_workflow: "FastAPI evaluation fixture"
    primary_role: dev-coder
    required_skills:
      - fastapi
      - python
    source_evidence:
      - path: evals/projects/fastapi-orders/pyproject.toml
        fact: "The independently owned fixture declares FastAPI."
      - path: evals/projects/fastapi-orders/app/main.py
        fact: "The fixture constructs a FastAPI application and route."
    verification_commands:
      - "python3 -m compileall -q evals/projects/fastapi-orders/app"
    nested_agents_file_needed: false
    nested_agents_file_path: "Not applicable"
nested_agents_files:
  - path: "Not applicable"
    needed: false
    reason: "The root AGENTS.md can express all current Python scope differences without duplicating repository-wide guidance."
    claude_bridge_path: "Not applicable"

documentation_and_file_contracts:
  - path: AGENTS.md
    purpose: "Operational routing reference loaded by agents."
  - path: PROJECT.yaml
    purpose: "Single project-wide setup and validation artifact for conceptual agent definitions, skillsets, folder routing, nested AGENTS.md placement, and evidence."
  - path: "Not applicable"
    purpose: "No project-local CLAUDE.md bridge is currently required."
  - path: README.md
    purpose: "Human-facing bundle, setup, installation, and verification reference."
  - path: design/generated
    purpose: "Generated documentation data derived from source skills and conceptual agent definitions."
  - path: generated/adapters
    purpose: "Generated native runtime agent definitions derived from conceptual agent definition sources."

validation_plan:
  commands:
    - command: "python3 scripts/validate-agent-skills.py skills"
      proves: "Every bundled skill satisfies the repository's Agent Skill contract."
    - command: "python3 scripts/build-technology-detection.py --check"
      proves: "Detection metadata, registry, and installed detector mirror are current."
    - command: "python3 scripts/build-skill-docs.py --check"
      proves: "Generated skill documentation, conceptual agent definition catalog data, and native adapter outputs match their sources."
    - command: "python3 scripts/build-agent-skill-hierarchy.py --check"
      proves: "The generated conceptual agent definition and skill hierarchy is current."
    - command: "python3 scripts/build-support-checklist.py --check"
      proves: "The generated support and evaluation coverage inventory is current."
    - command: "python3 -m unittest discover scripts"
      proves: "Repository maintenance, generation, installation, detection, and regression behavior passes."
    - command: "PYTHONPATH=skills/project-wiki/scripts python3 -m unittest discover skills/project-wiki/scripts"
      proves: "Project-wiki Python tooling passes its focused unit suite."
    - command: "git diff --check"
      proves: "Tracked changes contain no whitespace errors."
  technology_detection_checks:
    - "Run setup-time detection for scripts, skills/project-wiki/scripts, skills/detect-technology-skills/scripts, evals/projects/python-inventory, and evals/projects/fastapi-orders."
    - "Confirm every detection definition names its selected skill and uses a version 2 anyOf activation root."
    - "Confirm allOf clauses require every predicate and sourceImport ignores Python comments and string literals."
    - "Confirm leading globstar paths match root-level folders and fileMatch binds path and extension evidence to one code artifact."
    - "Reject fastapi for scripts because its evidence is detector-test content rather than an owning FastAPI runtime."
    - "Confirm skills/project-wiki/scripts produces only python because cli.py is Python rather than a Node-owned JavaScript or TypeScript CLI path."
    - "Confirm python and fastapi are installed and every accepted skillset retains source evidence."
    - "Confirm AGENTS.md requires matching folder skills before acting and does not tell ordinary agents to rerun detection."
  privacy_checks:
    - "Confirm distributable skills, conceptual agent definitions, generated adapters, and examples contain no PII, customer data, secrets, or company-internal material unless explicitly authorized."
  customer_safe_example_checks:
    - "Confirm customer-shareable examples use fictitious names, synthetic paths, and generic product behavior."

customer_safe_example_shape:
  required: false
  guidance: "Use fictitious names, synthetic paths, and generic product behavior when customer-facing examples are needed."
  forbidden_material:
    - "Private project names."
    - "Customer names."
    - "Internal workflows."
    - "Private architecture."
    - "Secrets."
    - "Non-public data."

proprietary_validation_notes:
  allowed_only_inside_private_project: true
  notes:
    - "No proprietary validation notes are recorded for the current routing setup."

open_questions:
  - question: "Will future Python subtrees add independently owned frameworks or verification commands?"
    owner: "Project Configurator"
    impact: "Rerun setup-time detection and revise only the affected skillset when technology boundaries change."

maintenance_notes:
  - "Keep PROJECT.yaml and the generated Technology Skills section in AGENTS.md aligned."
  - "Rerun technology detection only when Python ownership, manifests, dependencies, or framework boundaries change."
  - "Keep false-positive detector evidence explicit so broad test strings and filenames do not activate unrelated technology skills."
