schema: dev-methodology-eval-skill-probes
version: 2
coverageStatus: declared
sourceDigestPolicy: sha256-at-run
harnesses:
  - codex
  - junie
stagedResourcePolicy:
  defaultMode: selected-skill-package
  description: Stage the selected skill directory, including directly referenced task resources needed by the probe, rather than treating SKILL.md alone as the executable behavior contract.
  explicitTaskResources: Case manifests must list any fixture, template, script, reference, or schema outside the selected skill package that is visible to the run.
  transientTreeExclusions:
    - __pycache__
    - .pytest_cache
    - node_modules
    - dist
    - build
    - coverage
    - '*.pyc'
  derivativeSanitization:
    nonBehavioralPii: Replace non-behavioral PII in staged derivatives, including mandated copyright email addresses, with stable non-identifying placeholders while retaining the unsanitized source digest in trusted runner metadata.
    behavioralContent: Never sanitize content whose exact value is part of the behavior under evaluation; require explicit approval or a synthetic fixture instead.
  receipts:
    required: true
    fields:
      - sourceResourceDigests
      - effectiveResourceDigests
      - includedResources
      - excludedTransientTrees
      - sanitizationActions
  overrides: Per-probe overrides are permitted only when full-package staging is excessive or unsafe and must name included resources, exclusions, rationale, and both source and effective digests.
evaluationCategoryVocabulary:
  artifact-creation: Produces one named durable artifact under a specific creation contract.
  development-practice: Enforces a cross-cutting implementation or repository-work invariant.
  diagnosis: Establishes causal or runtime evidence for a defect or execution path.
  documentation-methodology: Creates, reviews, or explains structured methodology documentation.
  experience-and-interface: Reviews or implements user-facing interaction and presentation behavior.
  project-wiki: Operates on the repository project-wiki lifecycle and its raw, durable, and query boundaries.
  prompt-and-agent: Creates or reviews model-facing agent, prompt, skill, or tool contracts.
  stack-and-domain: Applies implementation behavior specific to a technology stack or runtime domain.
  verification: Selects, implements, or executes test and verification behavior.
  wiki-and-knowledge: Maintains source-backed code or knowledge documentation outside a project-wiki operation.
sourceCategoryPolicy: evaluationCategory is an evaluation taxonomy, not the skill frontmatter category; reporting reads the bundle catalog category directly from each source SKILL.md digest when that dimension is needed.
defaults:
  controls:
    - skill-ablation
    - wrong-skill-negative-control
  controlValidation: Every wrongSkillControl must resolve to a bundled skill ID, differ from the target skill, and be irrelevant to the probe activation condition; catalog validation fails otherwise.
  coverageSemantics: A linked executableCases entry is positive-case support only. Full probe coverage also requires an executable negative-activation case and paired target-present, target-omitted, and wrong-skill controls over frozen input.
  verifiedEvidenceRule: A declared probe or fixture link is not a verified run; verified evidence requires a valid receipt, captured identity and skill-read events, current digests, Judge results, and trusted provenance.
  modelJudgeRule: A Model Judge rubric may contribute only while a matching calibration record satisfies evals/judges.yaml.
  junieIdentityRule: A Junie result remains unverified unless captured subagent-start evidence identifies the intended custom agent.
probes:
  - id: probe-agent-claim
    skill: agent-claim
    source: skills/agent-claim/SKILL.md
    evaluationCategory: development-practice
    evaluationKind: workflow-invariant
    activationCondition: Repository mutation, claim extension, recovery, integration, or exclusive runtime resources are required.
    negativeCondition: Pure read-only inspection with no exclusive resource does not acquire a writer claim.
    expectedBehavior: Acquire the narrow supported scope, isolate non-overlapping writers, wait on overlap, journal transitions, and finish with a committed or truthful no-change clean release.
    judgePlan: {deterministicChecks: [skill-read-trace, claim-lifecycle, allowed-paths-only], modelRubric: null}
    scenarioAssociations: [dev-coder-happy, dev-orchestrator-boundary, dev-backlog-steward-happy, wiki-ingester-happy]
    workflowAssociations: [code-delivery, documentation-methodology, project-setup, wiki-lifecycle, backlog]
    executableCases: []
    coverageStatus: declared
    ablation: {omitTargetSkill: true, wrongSkillControl: project-wiki-query}
  - id: probe-agent-harness
    skill: agent-harness
    source: skills/agent-harness/SKILL.md
    evaluationCategory: stack-and-domain
    evaluationKind: activation-and-behavior
    activationCondition: Product code owns an agent execution loop, harness state, tool orchestration, modes, retries, cancellation, or resume.
    negativeCondition: Development-agent planning without product harness code does not activate this skill.
    expectedBehavior: Keep harness, prompt, tool, and user-visible state distinct and verify execution, cancellation, retry, routing, and long-running logs.
    judgePlan: {deterministicChecks: [skill-read-trace, required-command-outcome, tool-authority], modelRubric: null}
    scenarioAssociations: [dev-coder-happy, dev-prompt-reviewer-happy]
    workflowAssociations: [code-delivery]
    executableCases: []
    coverageStatus: declared
    ablation: {omitTargetSkill: true, wrongSkillControl: project-wiki-query}
  - id: probe-agent-role-authoring
