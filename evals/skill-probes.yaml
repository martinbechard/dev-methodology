    negativeCondition: Ordinary product implementation that does not change conceptual definitions does not activate this skill.
    expectedBehavior: Define one stable responsibility with aligned authority, bounded structured workflow, real skill and agent dependencies, distinct examples, generated adapters, and regression evidence.
    judgePlan: {deterministicChecks: [skill-read-trace, artifact-structure, generated-output-freshness, readiness-consistency], modelRubric: artifact-contract}
