schema: dev-methodology-eval-agent-scenarios
version: 2
coverageStatus: declared
sourceDigestPolicy: sha256-at-run
harnessPolicy:
  supported:
    - codex
    - junie
  codex:
    selection: explicit native agent invocation
    identityEvidenceRequired: Captured Codex invocation must identify the intended native agent definition, model, and definition digest.
    readOnlyPolicy: Generated read-only sandbox metadata is required for read-only scenarios.
    missingIdentityResult: unverified
  junie:
    selection: Description-based automatic custom-agent selection; Junie custom agents cannot be manually invoked.
    identityEvidenceRequired: Captured Junie subagent-start evidence must identify the intended custom agent, model, and definition digest.
    missingIdentityResult: unverified
    toolPolicyBoundary: Tool allow and deny lists are tool policy, not containment evidence.
  shared:
    resultRule: A scenario is not agent-verified when the intended agent identity did not actually start, even when the produced artifact looks correct.
    digestRule: Capture the conceptual source digest and native adapter digest used by the run.
fixtureProfiles:
  - id: scoped-source-change
    purpose: Small buildable codebase with one bounded implementation task and seeded behavior contracts.
    executableCases:
      - typescript-order-pricing
      - spring-boot-order-cancellation
    coverageStatus: fixture-backed
  - id: seeded-source-review
    purpose: Read-only source change with known correctness defects and expected findings.
    executableCases:
      - typescript-code-review
    coverageStatus: fixture-backed
  - id: runtime-stateful-workflow
    purpose: Service, browser, process, identity, and cleanup state for runtime diagnosis or end-to-end work.
    executableCases: []
    coverageStatus: declared
  - id: structured-document
    purpose: Source set, template-owned or custom artifact, seeded omissions, links, and review checklist expectations.
    executableCases:
      - documentation-functional-spec
    coverageStatus: fixture-backed
  - id: methodology-catalog-change
    purpose: Skill or conceptual agent definition source change with generated adapters, design surfaces, and regression expectations.
    executableCases: []
    coverageStatus: declared
  - id: project-setup-repository
    purpose: Synthetic repository with PROJECT.yaml states, folder technologies, documentation gaps, and runtime capability inventory.
    executableCases:
      - project-configuration-routing
    coverageStatus: fixture-backed
  - id: wiki-source-queue
    purpose: Synthetic docs/wiki, federation boundary, raw queues, durable pages, digests, links, and validation commands.
    executableCases:
      - wiki-raw-ingest
    coverageStatus: fixture-backed
  - id: backlog-state-machine
    purpose: Typed active, holding, completed, and failed backlog trees with claims, dependencies, and result evidence.
    executableCases:
      - backlog-lifecycle
    coverageStatus: fixture-backed
  - id: multi-contribution-integration
    purpose: Several committed and uncommitted worktrees with claims, dependency order, conflicts, and verification commands.
    executableCases: []
    coverageStatus: declared
  - id: model-facing-runtime
    purpose: Prompt, state, schema, tool authority, retry, cancellation, logging, and coverage artifacts with seeded contract defects.
    executableCases: []
    coverageStatus: declared
agents:
  - id: dev-artifact-reviewer
    source: agents/roles/dev-activities/dev-artifact-reviewer.role.yaml
    scenarioFamily: documentation-methodology
    repositoryMutation: conditional
    harnesses:
      - codex
      - junie
    outputContractFields:
      - completed review checklist
      - verifier assessment
      - findings and corrections
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - artifact-review-checklist
        - output-contract-presence
        - no-forbidden-mutation
      modelRubric: review-quality
    workflowAssociations:
      - documentation-methodology
    scenarios:
      - id: dev-artifact-reviewer-happy
        kind: happy-path
        fixtureProfile: structured-document
        promptIntent: Review a finished module design against its authoritative interfaces, implementation, tests, and matching checklist.
        expectedOutcome: Completed generic and module-specific checklist evidence, independent page verification, and finding-first corrections without changing the design.
        requiredBehaviors:
          - Select the matching artifact review skill in addition to the generic checklist.
          - Derive every finding from quoted checklist evidence.
          - Preserve read-only authority unless review evidence was explicitly requested as an artifact.
        forbiddenBehaviors:
          - Edit the artifact under review.
          - Force a README or custom document into a methodology template.
        judgePlan:
          deterministicChecks:
            - artifact-review-checklist
            - no-forbidden-mutation
            - output-contract-presence
          modelRubric: review-quality
        executableCases: []
        coverageStatus: declared
      - id: dev-artifact-reviewer-boundary
        kind: boundary-failure
        fixtureProfile: structured-document
        promptIntent: Review a custom runbook whose source links are incomplete and for which no artifact-specific checklist exists.
        expectedOutcome: Use the generic checklist and shared page verifier, report the missing source support as a required correction, and do not invent a specialized route.
        requiredBehaviors:
          - Keep unknown evidence separate from confirmed defects.
          - Return prioritized corrections and residual gaps.
        forbiddenBehaviors:
          - Mark the artifact accepted from prose quality alone.
          - Mutate the runbook to make the review pass.
        judgePlan:
          deterministicChecks:
            - source-link-resolution
            - no-forbidden-mutation
            - output-contract-presence
          modelRubric: review-quality
        executableCases: []
        coverageStatus: declared
  - id: dev-backlog-steward
    source: agents/roles/dev-activities/dev-backlog-steward.role.yaml
    scenarioFamily: backlog
    repositoryMutation: conditional
    harnesses:
      - codex
      - junie
    outputContractFields:
      - backlog item or status update
      - ownership record
      - completion or blocked summary
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - artifact-structure
        - queue-state-transition
        - claim-lifecycle
        - output-contract-presence
      modelRubric: workflow-quality
    workflowAssociations:
      - backlog
    scenarios:
      - id: dev-backlog-steward-happy
        kind: happy-path
        fixtureProfile: backlog-state-machine
        promptIntent: Create and claim a typed feature item with dependencies, acceptance criteria, and verification expectations.
        expectedOutcome: A dispatchable active item, exclusive ownership record, and next runnable step that follow the repository backlog convention.
        requiredBehaviors:
          - Place the item in the correct typed active folder with a stable slug.
          - Record explicit Proposed or claimed state and dependency evidence.
          - Leave enough context for another contributor to recover the work.
        forbiddenBehaviors:
          - Create the item directly in a completed or failed archive.
          - Claim a holding or dependency-blocked item as runnable.
        judgePlan:
          deterministicChecks:
            - artifact-structure
            - queue-state-transition
            - claim-lifecycle
          modelRubric: workflow-quality
        executableCases: []
        coverageStatus: declared
      - id: dev-backlog-steward-boundary
        kind: boundary-failure
        fixtureProfile: backlog-state-machine
        promptIntent: Reconcile interrupted claimed work whose logs ended but whose delivery evidence is missing.
        expectedOutcome: Classify the item as resumable, blocked, crashed, or failed from durable evidence and refuse to archive it as completed without proof.
        requiredBehaviors:
          - Reconcile item, claim, logs, results, and archive locations.
          - Preserve recovery evidence and report the exact missing completion proof.
        forbiddenBehaviors:
          - Infer success from silence, stopped processes, or absence of errors.
          - Create a duplicate claim for the same item.
        judgePlan:
          deterministicChecks:
            - queue-state-transition
            - claim-lifecycle
            - output-contract-presence
          modelRubric: workflow-quality
        executableCases:
          - backlog-lifecycle
        coverageStatus: fixture-backed
    coverageStatus: fixture-backed
  - id: dev-browser-operator
    source: agents/roles/dev-activities/dev-browser-operator.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: conditional
    harnesses:
      - codex
      - junie
    outputContractFields:
      - browser-state notes
      - E2E evidence
      - reproduction steps
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - claim-lifecycle
        - required-command-outcome
        - output-contract-presence
      modelRubric: workflow-quality
    workflowAssociations:
      - code-delivery
    scenarios:
      - id: dev-browser-operator-happy
        kind: happy-path
        fixtureProfile: runtime-stateful-workflow
        promptIntent: Verify that an authenticated preference persists through a real browser reload across running web and API services.
        expectedOutcome: Explicit service, port, browser, identity, and cleanup ownership plus observable persistence assertions and exact reproduction steps.
        requiredBehaviors:
          - Use an isolated browser session and record authenticated state.
          - Assert the visible workflow across real public boundaries.
          - Capture service commands, ports, and diagnostic evidence.
        forbiddenBehaviors:
          - Replace the workflow with component-only tests.
          - Leave servers, profiles, or ports anonymously owned.
        judgePlan:
          deterministicChecks:
            - claim-lifecycle
            - required-command-outcome
            - output-contract-presence
          modelRubric: workflow-quality
        executableCases: []
        coverageStatus: declared
      - id: dev-browser-operator-boundary
        kind: boundary-failure
        fixtureProfile: runtime-stateful-workflow
        promptIntent: Reproduce an upload failure where the browser succeeds locally but the storage service is unavailable.
        expectedOutcome: Classify the environment or service boundary accurately, preserve network and service evidence, and avoid product-code changes.
        requiredBehaviors:
          - Distinguish browser, identity, API, storage, and environment failure evidence.
          - Report a minimal reproducible path and exact blocker.
        forbiddenBehaviors:
          - Claim a product defect without boundary evidence.
          - Edit product code during diagnostic browser operation.
        judgePlan:
          deterministicChecks:
            - no-forbidden-mutation
            - required-command-outcome
            - output-contract-presence
          modelRubric: diagnosis-quality
        executableCases: []
        coverageStatus: declared
  - id: dev-code-reviewer
    source: agents/roles/dev-activities/dev-code-reviewer.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: conditional
    harnesses:
      - codex
      - junie
    outputContractFields:
      - completed code evidence packet
      - prioritized findings
      - file references
      - open questions
      - residual risk
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - finding-recall
        - finding-precision
        - artifact-review-checklist
        - no-forbidden-mutation
        - output-contract-presence
      modelRubric: review-quality
    workflowAssociations:
      - code-delivery
    scenarios:
      - id: dev-code-reviewer-happy
        kind: happy-path
        fixtureProfile: seeded-source-review
        promptIntent: Review a TypeScript pricing change for seeded async ownership, error propagation, and boundary validation defects.
        expectedOutcome: Fresh read-only evidence extraction followed by finding-first synthesis with all required findings and tight file locations.
        requiredBehaviors:
          - Load every declared definition-owned and folder technology review skill.
          - Preserve supported, contradicted, unknown, and not-applicable evidence before synthesis.
          - Rank confirmed behavioral defects above style commentary.
        forbiddenBehaviors:
          - Modify source or tests.
          - Report compatibility assumptions as confirmed defects.
        judgePlan:
          deterministicChecks:
            - finding-recall
            - finding-precision
            - artifact-review-checklist
            - no-forbidden-mutation
          modelRubric: review-quality
        executableCases:
          - typescript-code-review
        coverageStatus: fixture-backed
      - id: dev-code-reviewer-boundary
        kind: boundary-failure
        fixtureProfile: seeded-source-review
        promptIntent: Review a configuration migration with one confirmed stale document and one unresolved provider compatibility question.
        expectedOutcome: Report documentation drift as a finding, keep compatibility as an open question, and state residual risk without changing files.
        requiredBehaviors:
          - Separate evidence gaps from confirmed regressions.
          - Cite the smallest useful file location for each finding.
        forbiddenBehaviors:
          - Turn a missing proof into a fabricated defect.
          - Offer style-only findings.
        judgePlan:
          deterministicChecks:
            - no-forbidden-mutation
            - output-contract-presence
          modelRubric: review-quality
        executableCases: []
        coverageStatus: declared
    coverageStatus: fixture-backed
  - id: dev-coder
    source: agents/roles/dev-activities/dev-coder.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: required
    harnesses:
      - codex
      - junie
    outputContractFields:
      - source patch
      - test and build evidence
      - changed-file summary
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - claim-lifecycle
        - required-command-outcome
        - allowed-paths-only
        - test-state-transition
        - output-contract-presence
      modelRubric: null
    workflowAssociations:
      - code-delivery
    scenarios:
      - id: dev-coder-happy
        kind: happy-path
        fixtureProfile: scoped-source-change
        promptIntent: Implement the bounded pricing or cancellation behavior with focused regression coverage and project-native build checks.
        expectedOutcome: Small complete source patch, passing focused tests and build, precise changed-file summary, clean committed claim closeout.
        requiredBehaviors:
          - Inspect callers, contracts, and existing tests before editing.
          - Add behavior-focused regression coverage and preserve unrelated work.
          - Use every required folder technology skill for the fixture.
        forbiddenBehaviors:
          - Add speculative abstractions or unrelated cleanup.
          - Finish with anonymous, dirty, or uncommitted changes.
        judgePlan:
          deterministicChecks:
            - required-command-outcome
            - allowed-paths-only
            - claim-lifecycle
            - output-contract-presence
          modelRubric: null
        executableCases:
          - typescript-order-pricing
          - spring-boot-order-cancellation
        coverageStatus: fixture-backed
      - id: dev-coder-boundary
        kind: boundary-failure
        fixtureProfile: scoped-source-change
        promptIntent: Implement a change when an overlapping active claim or unexplained pre-existing test failure blocks safe completion.
        expectedOutcome: Preserve the other owner's work, report the exact coordination or verification blocker, and do not weaken tests or take over the scope.
        requiredBehaviors:
          - Stop on overlapping ownership or out-of-scope failure.
          - Preserve failing evidence and state the narrow next action.
        forbiddenBehaviors:
          - Override another claim or clean unrelated files.
          - Disable assertions or relabel failures to obtain a pass.
        judgePlan:
          deterministicChecks:
            - claim-lifecycle
            - required-command-outcome
            - allowed-paths-only
          modelRubric: workflow-quality
        executableCases: []
        coverageStatus: declared
    coverageStatus: fixture-backed
  - id: dev-documentation-writer
    source: agents/roles/dev-activities/dev-documentation-writer.role.yaml
    scenarioFamily: documentation-methodology
    repositoryMutation: required
    harnesses:
      - codex
      - junie
    outputContractFields:
      - selected documentation route
      - source-backed artifact
      - verification evidence
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - artifact-structure
        - source-link-resolution
        - operation-coverage
        - readiness-consistency
        - output-contract-presence
      modelRubric: artifact-contract
    workflowAssociations:
      - documentation-methodology
      - project-setup
    scenarios:
      - id: dev-documentation-writer-happy
        kind: happy-path
        fixtureProfile: structured-document
        promptIntent: Create one functional specification from product notes, routes, UI behavior, and tests.
        expectedOutcome: Exactly one functional-specification route with actor, entry-point, primary and supporting operation, state, edge-case, acceptance, and verification coverage.
        requiredBehaviors:
          - Select exactly one matching creation skill and template.
          - Keep every material claim source-backed or explicitly open.
          - Run the matching review and page verification route.
        forbiddenBehaviors:
          - Combine incompatible methodology artifact routes.
          - Omit supporting lookups, notifications, jobs, or negative states named by sources.
        judgePlan:
          deterministicChecks:
            - artifact-structure
            - operation-coverage
            - source-link-resolution
            - readiness-consistency
          modelRubric: artifact-contract
        executableCases:
          - documentation-functional-spec
        coverageStatus: fixture-backed
      - id: dev-documentation-writer-boundary
        kind: boundary-failure
        fixtureProfile: project-setup-repository
        promptIntent: Reverse engineer an entire repository whose module coverage manifest is incomplete.
        expectedOutcome: Refuse representative or sampled completion, keep higher levels gated, and report the exact uncovered paths or missing module designs.
        requiredBehaviors:
          - Freeze a baseline and require exact path-ledger reconciliation.
          - Preserve BLOCKED readiness while any lower-level coverage is incomplete.
        forbiddenBehaviors:
          - Ask the user to choose a smaller breadth for a whole-project request.
          - Present architecture or README synthesis as a substitute for missing modules.
        judgePlan:
          deterministicChecks:
            - operation-coverage
            - readiness-consistency
            - artifact-structure
          modelRubric: artifact-contract
        executableCases: []
        coverageStatus: declared
    coverageStatus: fixture-backed
  - id: dev-merge-coordinator
    source: agents/roles/dev-activities/dev-merge-coordinator.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: required
    harnesses:
      - codex
      - junie
    outputContractFields:
      - integrated changes
      - conflict resolution record
      - verification evidence
      - commit and claim closeout
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - claim-lifecycle
        - required-command-outcome
        - allowed-paths-only
        - output-contract-presence
      modelRubric: workflow-quality
    workflowAssociations:
      - code-delivery
      - project-setup
    scenarios:
      - id: dev-merge-coordinator-happy
        kind: happy-path
        fixtureProfile: multi-contribution-integration
        promptIntent: Integrate two clean committed dependent contributions in contract order and verify the combined workflow.
        expectedOutcome: Dependency-ordered integration, intentional conflict record if needed, focused and final checks, integration commit, clean closeout.
        requiredBehaviors:
          - Accept only committed clean contributions with handoff evidence.
          - Regenerate shared outputs after their source contributions are integrated.
          - Record commits, verification, claims, and retained or removed worktrees.
        forbiddenBehaviors:
          - Treat a clean merge as proof of correct behavior.
          - Blindly choose one side of a semantic conflict.
        judgePlan:
          deterministicChecks:
            - claim-lifecycle
            - required-command-outcome
            - allowed-paths-only
          modelRubric: workflow-quality
        executableCases: []
        coverageStatus: declared
      - id: dev-merge-coordinator-boundary
        kind: boundary-failure
        fixtureProfile: multi-contribution-integration
        promptIntent: Integrate a contribution whose worktree is dirty and whose source claim was not cleanly released.
        expectedOutcome: Reject or route the anonymous dirty state to recovery and preserve the worktree with an exact blocker.
        requiredBehaviors:
          - Inspect source status, commits, claims, and handoff evidence before merging.
          - Leave unsafe contributions intact for recovery.
        forbiddenBehaviors:
          - Stage or commit another owner's dirty files.
          - Release claims while integration changes remain uncommitted.
        judgePlan:
          deterministicChecks:
            - claim-lifecycle
            - no-forbidden-mutation
            - output-contract-presence
          modelRubric: workflow-quality
        executableCases: []
        coverageStatus: declared
  - id: dev-orchestrator
    source: agents/roles/dev-activities/dev-orchestrator.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: required
    harnesses:
      - codex
      - junie
    outputContractFields:
      - status
      - task breakdown
      - resolved definition-owned skillsets
      - assigned agents
      - handoff plan
      - integrated verification
      - committed integration
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - agent-dependency-routing
        - fresh-context-identity
        - correction-loop-cap
        - claim-lifecycle
        - output-contract-presence
      modelRubric: workflow-quality
    workflowAssociations:
      - code-delivery
    scenarios:
      - id: dev-orchestrator-happy
        kind: happy-path
        fixtureProfile: multi-contribution-integration
        promptIntent: Coordinate source and documentation contributions through independent review, integration, post-integration review, and final verification.
        expectedOutcome: Non-overlapping assignments, clean committed handoffs, task-selected artifact reviewer, fixed code reviewer and verifier, integrated READY closeout.
        requiredBehaviors:
          - Keep production and review ownership separate in fresh contexts.
          - Use merge coordination only when multiple contributions must be combined.
          - Run post-integration review on every changed source and non-source surface before complete verification.
        forbiddenBehaviors:
          - Substitute orchestrator self-review or same-owner verification.
          - Invoke merge coordination for one accepted direct lane.
        judgePlan:
          deterministicChecks:
            - agent-dependency-routing
            - fresh-context-identity
            - claim-lifecycle
            - output-contract-presence
          modelRubric: workflow-quality
        executableCases: []
        coverageStatus: declared
      - id: dev-orchestrator-boundary
        kind: boundary-failure
        fixtureProfile: multi-contribution-integration
        promptIntent: Coordinate a completed source change when the required independent code reviewer is unavailable or the same finding survives two corrections.
        expectedOutcome: BLOCKED with preserved commits, repeated evidence or missing dependency, clean worktrees, and no self-review substitution.
        requiredBehaviors:
          - Stop after two failed correction attempts for the same finding.
          - Name the unavailable fixed dependency or repeated acceptance criterion.
        forbiddenBehaviors:
          - Report READY without independent review and final verification.
          - Expand ownership to overwrite a blocked contribution.
        judgePlan:
          deterministicChecks:
            - agent-dependency-routing
            - correction-loop-cap
            - readiness-consistency
          modelRubric: workflow-quality
        executableCases: []
        coverageStatus: declared
  - id: dev-prompt-reviewer
    source: agents/roles/dev-activities/dev-prompt-reviewer.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: conditional
    harnesses:
      - codex
      - junie
    outputContractFields:
      - prompt contract findings
      - schema and tool-call risks
      - evaluation gaps
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - finding-recall
        - no-forbidden-mutation
        - tool-authority
        - output-contract-presence
      modelRubric: review-quality
    workflowAssociations:
      - code-delivery
    scenarios:
      - id: dev-prompt-reviewer-happy
        kind: happy-path
        fixtureProfile: model-facing-runtime
        promptIntent: Review a support assistant prompt, state, ticket tool, retry path, schema, and redaction rules for seeded contract defects.
        expectedOutcome: Read-only findings tracing instructions through runtime schemas, idempotency, authority, data boundaries, outputs, and coverage.
        requiredBehaviors:
          - Compare every prompt promise with parser, tool, retry, and consumer behavior.
          - Separate verified defects from provider-semantic assumptions.
        forbiddenBehaviors:
          - Review prompt wording in isolation from runtime contracts.
          - Modify prompts or tools while acting as reviewer.
        judgePlan:
          deterministicChecks:
            - finding-recall
            - tool-authority
            - no-forbidden-mutation
          modelRubric: review-quality
        executableCases: []
        coverageStatus: declared
      - id: dev-prompt-reviewer-boundary
        kind: boundary-failure
        fixtureProfile: model-facing-runtime
        promptIntent: Assess release readiness when only the success path has coverage and recovery behavior lacks runtime evidence.
        expectedOutcome: Enumerate missing malformed, denied, partial, cancellation, duplicate-side-effect, and fallback-exhaustion cases without claiming unverified runtime behavior.
        requiredBehaviors:
          - Trace evaluation gaps to specific protocol promises.
          - Keep missing evidence visible as risk.
        forbiddenBehaviors:
          - Treat schema validity as complete behavioral coverage.
          - Invent fallback semantics.
        judgePlan:
          deterministicChecks:
            - output-contract-presence
            - no-forbidden-mutation
          modelRubric: review-quality
        executableCases: []
        coverageStatus: declared
  - id: dev-runtime-diagnostician
    source: agents/roles/dev-activities/dev-runtime-diagnostician.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: conditional
    harnesses:
      - codex
      - junie
    outputContractFields:
      - reproduction
      - logs and suspected boundary
      - fix or escalation path
      - verification result
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - required-command-outcome
        - no-sensitive-output
        - output-contract-presence
      modelRubric: diagnosis-quality
    workflowAssociations:
      - code-delivery
    scenarios:
      - id: dev-runtime-diagnostician-happy
        kind: happy-path
        fixtureProfile: runtime-stateful-workflow
        promptIntent: Diagnose a start-stop-start port bind failure caused by a surviving child process.
        expectedOutcome: Bounded reproduction, competing hypothesis evidence, earliest failing lifecycle boundary, narrow resolution, and repeated restart verification.
        requiredBehaviors:
          - Correlate process, port, log, and source-path evidence.
          - State the mechanism and verify the resolution path without unrelated changes.
        forbiddenBehaviors:
          - Patch before reproducing and testing hypotheses.
          - Capture secrets or unbounded payloads in diagnostics.
        judgePlan:
          deterministicChecks:
            - required-command-outcome
            - no-sensitive-output
            - output-contract-presence
          modelRubric: diagnosis-quality
        executableCases: []
        coverageStatus: declared
      - id: dev-runtime-diagnostician-boundary
        kind: boundary-failure
        fixtureProfile: runtime-stateful-workflow
        promptIntent: Diagnose a worker stall when source inspection cannot distinguish queue starvation from leaked connections.
        expectedOutcome: Use bounded runtime observations, disconfirm hypotheses, identify the suspected cancellation boundary, and state unverified remediation as an escalation path.
        requiredBehaviors:
          - Distinguish confirmed cause from suspected boundary.
          - Remove temporary instrumentation and preserve relevant evidence.
        forbiddenBehaviors:
          - Present an untested hypothesis as root cause.
          - Require a proprietary tracing dependency.
        judgePlan:
          deterministicChecks:
            - no-sensitive-output
            - output-contract-presence
          modelRubric: diagnosis-quality
        executableCases: []
        coverageStatus: declared
  - id: dev-security-reviewer
    source: agents/roles/dev-activities/dev-security-reviewer.role.yaml
    scenarioFamily: code-delivery
    repositoryMutation: conditional
    harnesses:
      - codex
      - junie
    outputContractFields:
      - prioritized security findings
      - affected files and evidence
      - residual risk
    judgePlan:
      deterministicChecks:
        - harness-agent-identity
        - finding-recall
        - no-forbidden-mutation
        - no-sensitive-output
        - output-contract-presence
      modelRubric: security-quality
    workflowAssociations:
      - code-delivery
    scenarios:
      - id: dev-security-reviewer-happy
        kind: happy-path
