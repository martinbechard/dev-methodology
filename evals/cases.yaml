schema: dev-methodology-agent-skill-evals
version: 2
coverageStatus: mixed
sourceDigestPolicy: sha256-at-run
supportedHarnesses:
  - codex
  - junie
catalogs:
  skillProbes: evals/skill-probes.yaml
  agentScenarios: evals/agent-scenarios.yaml
  workflowPacks: evals/workflow-packs.yaml
  judges: evals/judges.yaml
  sandboxProfiles: evals/sandbox-profiles.yaml
coverageSemantics:
  declared: The case contract exists, but no runnable fixture and current valid receipt establish execution coverage.
  fixture-backed: The fixture and commands exist; this status alone does not assert a successful run.
  executed: A current receipt establishes a structurally complete harness capture.
  judge-passed: Required Deterministic Judge and Model Judge checks passed; calibration status is reported separately.
  security-contained: A governed external runner established the required security boundary.
  stale-by-digest: A prior receipt no longer matches one or more governed identities.
caseDefaults:
  contextStaging: explicit-allow-list
  wholeRepositoryAllowed: false
  approvedSensitiveData: false
  transientTreePolicy: inherit-sandbox-profile
  stagedSkillResourcePolicy: inherit-skill-probes-catalog
  digestPolicy: sha256-source-and-effective-at-run
  ephemeralWritePaths: []
  risk: {level: ordinary, reasons: []}
  executionTier: local
  securityContainmentRequired: false
cases:
