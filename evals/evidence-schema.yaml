notes:
  - A declared case or a fixture pass is not verified behavior evidence.
  - Human-attested and locally labeled CI exports can record execution, but cannot become verified until a governed external verifier validates a trust-anchored attestation.
  - Every current case requires external post-run verification, so local receipt classification remains unverified even when its captured run is structurally complete.
  - Receipt version 2 records current agent, skill, model, harness, context-pack, and approved-input digests.
  - Digest drift produces stale-by-digest rather than verified status.
  - Skill readEvidence must reference captured harness tool calls, not an agent-authored claim.
  - Forbidden skill reads are detected from the complete normalized event ledger.
  - Every evidence reference uses relative file#marker syntax and resolves inside the receipt directory.
  - Functional isolation reports workspace mutation compliance separately from security containment.
  - Functional isolation hashes the complete workspace, reports declared ephemeral build output separately, and never permits dependency or tool trees as ephemeral paths.
  - Codex records native sandbox mode plus the runner-owned workspace boundary.
  - Junie records externally enforced containment or explicitly reports containment as unverified.
  - A caller-created Junie runner attestation is self-attested and remains containment-unverified until a governed trust anchor verifies it.
  - Every verified Codex or Junie attribution resolves a digest-bound agent-start event for the effective native adapter.
  - Version-two skill evidence binds unsanitized source, effective model-visible content, selected resources, and sanitization actions.
  - Prepared source and case-definition drift make a receipt stale, and the prepared key binds toolchain and controlled-environment identity.
  - A full skill probe requires comparable treatment, target-omitted, and wrong-skill receipts with one probeComparisonKey.
  - Deterministic Judges run first and only a critical deterministic failure skips the Model Judge.
  - A Model Judge result is current only while every calibration identity and digest remains unchanged.
  - A canonical Model Judge request binds the selected case, run, harness, candidate-output artifact, and every governed evidence artifact by digest.
