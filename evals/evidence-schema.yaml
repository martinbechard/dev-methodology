classificationOutput:
  primaryClaims:
    - executed
    - judgePassed
    - securityContained
    - judgeCalibrationStatus
    - staleByDigest
  compatibilityFields:
    - verified
  semantics:
    executed: A structurally complete harness capture exists.
    judgePassed: Required Judge checks passed independently of security containment.
    securityContained: A governed external runner established the declared security boundary.
    judgeCalibrationStatus: Model Judge calibration is not-required, pending, or calibrated.
    staleByDigest: One or more governed source or evidence identities have drifted.
    verified: Deprecated compatibility field; not used as a primary reporting claim.
