schema: dev-methodology-model-judge-output-schema
version: 1
contractVersion: model-judge-v1
type: object
additionalProperties: false
required:
  - schema
  - version
  - contractVersion
  - rubricId
  - rubricSha256
  - instructionEnvelopeSha256
  - inputManifestSha256
  - dimensionScores
  - overall
properties:
  schema:
    type: string
    const: dev-methodology-model-judge-output
  version:
    type: integer
    const: 1
  contractVersion:
    type: string
    const: model-judge-v1
  rubricId:
    type: string
    minLength: 1
  rubricSha256:
    type: string
    pattern: "^[0-9a-f]{64}$"
  instructionEnvelopeSha256:
    type: string
    pattern: "^[0-9a-f]{64}$"
  inputManifestSha256:
    type: string
    pattern: "^[0-9a-f]{64}$"
  dimensionScores:
    type: array
    minItems: 1
    uniqueBy: id
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - score
        - critical
        - evidenceReferences
        - rationale
      properties:
        id:
          type: string
          minLength: 1
        score:
          type: integer
          range: [0, 4]
        critical:
          type: boolean
          authority: trusted-rubric
        evidenceReferences:
          type: array
          minItems: 1
          uniqueBy: [documentId, locator]
          items:
            type: object
            additionalProperties: false
            required: [documentId, locator]
            properties:
              documentId:
                type: string
                minLength: 1
              locator:
                type: string
                minLength: 1
        rationale:
          type: string
          minLength: 1
  overall:
    type: object
    additionalProperties: false
    required: [verdict, criticalFailure]
    properties:
      verdict:
        type: string
        enum: [pass, fail]
        authority: recomputed-from-rubric
      criticalFailure:
        type: boolean
        authority: recomputed-from-rubric
