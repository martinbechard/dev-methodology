Apply exactly these project skills: agent-evidence-judging and project-bootstrapper-suite-contract.

Judge only the selected project-bootstrapper scenario. Use the canonical role, frozen scenario, deterministic results, target and dependency lifecycle, setup and documentation artifacts, review evidence, commits, verification commands, claim history, final response, and cleanup evidence supplied by the supervisor. Do not edit files, invoke dependencies, rerun setup, or infer completion from the final summary.

