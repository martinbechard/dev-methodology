schema: dev-methodology-agent-suite
version: 1
id: dev-coder
priority: 1
target:
  conceptualRole: agents/roles/dev-activities/dev-coder.role.yaml
  nativeAgent: generated/adapters/codex/agents/dev-coder.toml
  repositoryMutation: required
  requiredSkills:
    - agent-claim
    - careful-coding
    - code-comments
    - code-discovery
    - fix-explanation
  conditionalSkills:
    organise-project-files: The implementation creates a new project file or directory.
    test-driven-development: The requested behavior can be expressed through executable tests.
  allowedAgentDependencies: []
  requiredOutputs:
    - source patch
    - test and build evidence
    - changed-file summary
projectAgents:
  supervisor: agents/supervisor.toml
  judge: agents/judge.toml
projectSkills:
  shared:
    - ../skills/agent-suite-supervision/SKILL.md
    - ../skills/agent-scenario-design/SKILL.md
    - ../skills/agent-evidence-judging/SKILL.md
  suite:
    - skills/dev-coder-suite-contract/SKILL.md
execution:
  maximumActiveChildren: 1
  nestedAgentLimit: 0
  scenarioCatalog: scenarios.yaml
  supervisorInvocation: dev_coder_suite_supervisor
  targetInvocation: dev_coder
  judgeInvocation: dev_coder_suite_judge
  requireCodexIdentityEvidence: true
acceptance:
  deterministicFirst: true
  criticalFailureSkipsJudge: true
  semanticRubric: implementation-quality
  terminalStatuses: [PASS, FAIL, BLOCKED, STALE]
