<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Account setup</title></head>
<body><main><h1>Account setup</h1><p id="progress" aria-live="polite">Step 1 of 2</p><section id="step-one"><h2>Email</h2><form id="email-form" novalidate><label>Email <input id="email" type="email" required></label><p id="email-error" role="alert" hidden>Enter a valid email address.</p><button type="submit">Continue</button></form><button id="recover" type="button">Recover a saved setup</button></section><section id="step-two" hidden><h2 id="preferences-heading" tabindex="-1">Preferences</h2><label><input type="checkbox"> Weekly summary</label><button id="finish" type="button">Finish setup</button></section><p id="success" role="status" tabindex="-1" hidden>Account setup complete.</p></main><script>const first=document.querySelector('#step-one');const second=document.querySelector('#step-two');const progress=document.querySelector('#progress');const email=document.querySelector('#email');const error=document.querySelector('#email-error');function showStepTwo(){first.hidden=true;second.hidden=false;progress.textContent='Step 2 of 2';document.querySelector('#preferences-heading').focus()}document.querySelector('#email-form').addEventListener('submit',event=>{event.preventDefault();if(!email.validity.valid){error.hidden=false;email.focus();return}error.hidden=true;showStepTwo()});document.querySelector('#recover').addEventListener('click',showStepTwo);document.querySelector('#finish').addEventListener('click',()=>{second.hidden=true;progress.textContent='Complete';const success=document.querySelector('#success');success.hidden=false;success.focus()});</script></body></html>
