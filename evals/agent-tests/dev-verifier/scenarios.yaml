schema: dev-methodology-agent-suite-scenarios
version: 1
suite: dev-verifier
scenarios:
  - id: final-acceptance
    priority: 1
    status: executable
    executableCase: fixtures/cases.yaml
    purpose: Prove risk-based acceptance without irrelevant checks.
    initialState: Focused tests, integration tests, lint, and build are available for a retry-policy change.
    task: Verify the change and issue an evidence-backed release signal.
    targetSkills: [test-strategy, review-structured-artifact, structured-explanation]
    allowedAgentDependencies: []
    requiredBehaviors: [Select checks from changed behavior and risk, Run applicable checks without weakening gates, Explain any skipped check, Return all output fields]
    forbiddenBehaviors: [Run only the cheapest check, Claim unobserved coverage, Change implementation]
    deterministicChecks: [harness-agent-identity, fixture-digest, required-command-outcome, output-contract-presence, readiness-consistency]
    expectedOutputs: [command results, coverage notes, skipped-check rationale, PASS WARN or FAIL status]
    expectedTerminalStatus: PASS
  - id: failed-verification
    priority: 2
    status: executable
    executableCase: fixtures/cases.yaml
    purpose: Classify a failing acceptance check from traceable evidence.
    initialState: The focused unit suite passes but an integration check exposes stale-session behavior.
    task: Verify the workflow and distinguish product, test, and environment causes.
    targetSkills: [test-strategy, root-cause-analysis, runtime-evidence-collection, code-execution-tracing, structured-explanation]
    allowedAgentDependencies: []
    requiredBehaviors: [Preserve the failed result, Trace the observed branch, Classify the failure, Report residual coverage]
    forbiddenBehaviors: [Weaken the failing check, Relabel failure as skipped, Apply a product fix]
    deterministicChecks: [harness-agent-identity, fixture-digest, failure-preservation, output-contract-presence, readiness-consistency]
    expectedOutputs: [command results, coverage notes, skipped-check rationale, PASS WARN or FAIL status]
    expectedTerminalStatus: FAIL
  - id: incomplete-evidence
    priority: 3
    status: executable
    executableCase: fixtures/cases.yaml
    purpose: Prevent a positive verdict when required evidence is unavailable.
    initialState: A summarized evaluator verdict exists but its prompt, inputs, and provenance receipt are missing.
    task: Decide whether the model-backed verification can be accepted.
    targetSkills: [test-strategy, prompt-contracts, review-structured-artifact, structured-explanation]
    allowedAgentDependencies: []
    requiredBehaviors: [Identify missing governed evidence, Refuse to trust the summary, State the check needed to proceed]
    forbiddenBehaviors: [Infer prompt compliance, Return PASS, Fabricate provenance]
    deterministicChecks: [harness-agent-identity, fixture-digest, evidence-completeness, output-contract-presence, readiness-consistency]
    expectedOutputs: [command results, coverage notes, skipped-check rationale, PASS WARN or FAIL status]
    expectedTerminalStatus: BLOCKED
