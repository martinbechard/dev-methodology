schema: dev-methodology-eval-sandbox-profiles
version: 2
coverageStatus: declared
sourceDigestPolicy: sha256-at-run
componentImplementationStatus:
  preparedSnapshotCache: implemented
  copyOnWriteWorkspace: implemented
  explicitContextPruning: implemented
  disposableCleanup: implemented
  codexNativeFastPath: implemented
  fullPreparedIntegrityBeforeLiveClone: implemented
  completeWorkspaceMutationAudit: implemented
  runnerOwnedEvidenceRoot: implemented
  governedCodexOutputSchema: implemented
  hostInstallDuringLiveRun: forbidden
  hostPostRunVerification: forbidden
  dependencyCacheMounting: not-implemented
  externalContainmentRunner: not-implemented
  externalDiffVerifier: not-implemented
  captureTrustAnchor: not-implemented
  junieDirectExecution: implemented-local-tier
  warmWorkerPooling: proposed
snapshotPolicy:
  integrityCheckedPreparedSnapshots: true
  filesystemImmutabilityEnforced: false
  fullIntegrityCheckBeforeLiveClone: true
  prepareOncePerDigest: true
  cacheKeyInputs:
    - fixtureSourceSha256
    - dependencyLockSha256
    - operatingSystem
    - architecture
    - toolchainVersions
  dependencyInstallation: Allowed only as an explicit trusted-fixture preparation step; live harness execution refuses install hooks.
  dependencyCaches: External read-only or content-addressed dependency-cache mounting is not implemented.
  runWorkspace: Copy-on-write clone of the prepared snapshot.
  fallback: A full disposable copy is allowed when copy-on-write is unavailable; the containment claim must not change.
  reset: Discard the writable layer after Judges and receipt capture finish.
  runAudit: Hash the complete workspace, including dependency and build trees, while excluding only runner-owned context, metadata, and Git control artifacts. Record narrowly declared recognized ephemeral build output separately from product changes, and never classify a path containing a dependency or tool component as ephemeral even beneath an allowed ancestor.
  highRiskExternalVerification: For an explicitly high-risk case, discard ephemeral output, apply only the validated allowed product diff to a fresh full-integrity clone with pristine dependencies, then run checks under governed external containment. This tier is not implemented.
  concurrency: The current runner executes selected cases serially. A future bounded executor may run independent cases concurrently while serializing declared exclusive resources.
  contextStaging:
    default: Explicit case allow-list only; never stage the whole repository implicitly.
    preflight: Inventory staged files, scan model-visible content for seeded secrets, PII, and company-sensitive patterns, and reject unapproved matches.
    receipt: Record the approved context-pack SHA-256 digest and any explicit sensitive-data approval reference.
containmentStatusVocabulary:
  externally-contained: External runner evidence proves filesystem, process, network, and resource containment.
  workspace-isolated-only: Disposable workspace isolation is proved, but one or more wider containment dimensions are not.
  containment-unverified: The run has no sufficient external attestation for containment or workspace isolation.
executionTiers:
  local:
    harnesses: [codex, junie]
    externalRunnerRequired: false
    useWhen: Ordinary synthetic evaluations that do not run untrusted third-party code, handle secrets, or require a security-containment claim.
    enforcement: Both harnesses use a disposable copy-on-write fixture, controlled configuration and environment, complete mutation auditing, wall-clock timeout and process cleanup, exclusively reserved runner-owned evidence paths, and approved-value capture redaction. Codex also applies its native sandbox.
    requiredReceiptEvidence: [prepared-snapshot-digest, copy-on-write-layer-identity, controlled-configuration, controlled-environment, complete-workspace-diff, timeout-policy, isolated-evidence-root, exclusive-output-reservation, approved-value-redaction, discard-confirmation]
    securityContained: false
    containmentReporting: Codex may report workspace-isolated-only from its native sandbox evidence; Junie reports containment-unverified.
    implementationStatus: implemented
  externally-contained:
    harnesses: [codex, junie]
    externalRunnerRequired: true
    useWhen: An explicitly high-risk case that runs untrusted third-party code, handles secrets, permits destructive commands, or requires full filesystem, process, network, and resource containment.
    enforcement: External VM or equivalent runner wraps the disposable copy-on-write fixture and the selected harness policy, applies the allowed product diff to a pristine verifier clone, and signs the complete receipt artifact manifest.
    requiredReceiptEvidence: [external-runner-attestation, signed-receipt-manifest, prepared-snapshot-digest, copy-on-write-layer-identity, complete-workspace-diff, pristine-verifier-clone, project-hash-policy, command-evidence, discard-confirmation]
    maximumReportedStatus: externally-contained
    implementationStatus: not-implemented
  juniePolicy: Junie runs ordinary cases in the local tier. Its tool allow and deny lists are capability routing rather than security containment, so local Junie runs never claim security-contained status.
profiles:
  - id: codex-read-only
    harness: codex
    repositoryMutation: never
    implementationStatus: partial
    componentStatus:
      preparedSnapshotCache: implemented
      copyOnWriteWorkspace: implemented
      explicitContextPruning: implemented
      disposableCleanup: implemented
      nativeHarnessPolicy: implemented
      externalContainmentRunner: not-implemented
      warmWorkerPooling: proposed
    preparedSnapshot:
      mode: integrity-checked-content-addressed
      dependenciesPreinstalled: when the trusted preparation step ran the declared install command
      digestInputs: inherit-snapshot-policy
    copyOnWriteWorkspace:
      enabled: true
      writablePaths:
        - run-evidence
      productWorkspaceMode: read-only
      discardAfterRun: true
    warmWorker:
      enabled: false
      implementationStatus: proposed
      poolKey:
        - codex
        - operatingSystem
        - architecture
        - toolchainVersions
      resetBoundary: fresh-copy-on-write-layer-and-fresh-harness-context
    workspaceIsolation:
      externalRunnerRequired: false
      externalRunnerRequiredWhen: The case requires externally-contained evidence, executes untrusted code, or applies a network-sensitive policy.
      nativeHarnessPolicy: read-only sandbox metadata from the generated Codex agent definition
      nativePolicyRole: Enforces the native read-only boundary inside the disposable fixture; it does not prove process, network, or resource containment.
      hashExpectation: unchanged product workspace
    containment:
      fastPath: Native read-only policy plus copy-on-write reset may report workspace-isolated-only when every required receipt field is present.
      externalPath: External runner restricts filesystem access, isolates or allow-lists processes, applies network policy, and enforces resource limits.
      reportedStatus: containment-unverified
      permittedReportedStatuses: [containment-unverified, workspace-isolated-only, externally-contained]
      externalAttestationRequiredFor: externally-contained
    digestInputs:
      - fixtureSourceSha256
      - sandboxProfileSha256
      - nativeAgentDefinitionSha256
      - toolchainVersionsSha256
  - id: codex-workspace-write
    harness: codex
    repositoryMutation: required-or-conditional
    implementationStatus: partial
    componentStatus:
      preparedSnapshotCache: implemented
      copyOnWriteWorkspace: implemented
      explicitContextPruning: implemented
      disposableCleanup: implemented
      nativeHarnessPolicy: implemented
      externalContainmentRunner: not-implemented
      warmWorkerPooling: proposed
    preparedSnapshot:
      mode: integrity-checked-content-addressed
      dependenciesPreinstalled: when the trusted preparation step ran the declared install command
      digestInputs: inherit-snapshot-policy
    copyOnWriteWorkspace:
      enabled: true
      writablePaths:
        - product-workspace
        - run-evidence
      productWorkspaceMode: workspace-write
      discardAfterRun: true
    warmWorker:
      enabled: false
      implementationStatus: proposed
      poolKey:
        - codex
        - operatingSystem
        - architecture
        - toolchainVersions
      resetBoundary: fresh-copy-on-write-layer-and-fresh-harness-context
    workspaceIsolation:
      externalRunnerRequired: false
      externalRunnerRequiredWhen: The case requires externally-contained evidence, executes untrusted code, or applies a network-sensitive policy.
      nativeHarnessPolicy: workspace-write limited to the disposable workspace
      nativePolicyRole: Enforces the native workspace-write boundary inside the disposable fixture; it does not prove process, network, or resource containment.
      hashExpectation: changes allowed only on the case path allow-list
    containment:
      fastPath: Native workspace-write policy plus copy-on-write reset may report workspace-isolated-only when every required receipt field is present.
      externalPath: External runner restricts filesystem access, isolates or allow-lists processes, applies network policy, and enforces resource limits.
      reportedStatus: containment-unverified
      permittedReportedStatuses: [containment-unverified, workspace-isolated-only, externally-contained]
      externalAttestationRequiredFor: externally-contained
    digestInputs:
      - fixtureSourceSha256
      - sandboxProfileSha256
      - nativeAgentDefinitionSha256
      - toolchainVersionsSha256
  - id: junie-read-only
    harness: junie
    repositoryMutation: never
    implementationStatus: local-tier-implemented
    liveExecutionStatus: runnable-local
    componentStatus:
      preparedSnapshotCache: implemented
      copyOnWriteWorkspace: implemented
      explicitContextPruning: implemented
      disposableCleanup: implemented
      nativeHarnessPolicy: unavailable
      externalContainmentRunner: not-implemented
      warmWorkerPooling: proposed
    preparedSnapshot:
      mode: integrity-checked-content-addressed
      dependenciesPreinstalled: when the trusted preparation step ran the declared install command
      digestInputs: inherit-snapshot-policy
    copyOnWriteWorkspace:
      enabled: true
      writablePaths:
        - run-evidence
      productWorkspaceMode: writable-with-read-only-contract-audit
      discardAfterRun: true
    warmWorker:
      enabled: false
      implementationStatus: proposed
      poolKey:
        - junie
        - operatingSystem
        - architecture
        - toolchainVersions
      resetBoundary: fresh-copy-on-write-layer-and-fresh-junie-session
    workspaceIsolation:
      externalRunnerRequired: false
      externalRunnerRequiredWhen: The case explicitly declares high risk and selects the externally-contained tier.
      nativeHarnessPolicy: tool allow and deny lists may reduce available actions
      nativePolicyRole: Tool policy is not security containment; the local tier detects and rejects any product mutation after the run.
      hashExpectation: unchanged product workspace
    containment:
      localPath: Disposable workspace, controlled configuration, timeout, isolated evidence, and post-run mutation audit without a security-containment claim.
      externalPath: An external VM or equivalent runner enforces filesystem, process, network, and resource containment for an explicitly high-risk case.
      reportedStatus: containment-unverified
      permittedReportedStatuses: [containment-unverified, externally-contained]
      externalAttestationRequiredFor: externally-contained
    digestInputs:
      - fixtureSourceSha256
      - sandboxProfileSha256
      - junieAgentDefinitionSha256
      - toolchainVersionsSha256
  - id: junie-workspace-write
    harness: junie
    repositoryMutation: required-or-conditional
    implementationStatus: local-tier-implemented
    liveExecutionStatus: runnable-local
    componentStatus:
      preparedSnapshotCache: implemented
      copyOnWriteWorkspace: implemented
      explicitContextPruning: implemented
      disposableCleanup: implemented
      nativeHarnessPolicy: unavailable
      externalContainmentRunner: not-implemented
      warmWorkerPooling: proposed
    preparedSnapshot:
      mode: integrity-checked-content-addressed
      dependenciesPreinstalled: when the trusted preparation step ran the declared install command
      digestInputs: inherit-snapshot-policy
    copyOnWriteWorkspace:
      enabled: true
      writablePaths:
        - product-workspace
        - run-evidence
      productWorkspaceMode: writable-with-allowed-path-audit
      discardAfterRun: true
    warmWorker:
      enabled: false
      implementationStatus: proposed
      poolKey:
        - junie
        - operatingSystem
        - architecture
        - toolchainVersions
      resetBoundary: fresh-copy-on-write-layer-and-fresh-junie-session
    workspaceIsolation:
      externalRunnerRequired: false
      externalRunnerRequiredWhen: The case explicitly declares high risk and selects the externally-contained tier.
      nativeHarnessPolicy: tool allow and deny lists may reduce available actions
      nativePolicyRole: Tool policy is not security containment; the local tier rejects writes outside the case allow-list after the run.
      hashExpectation: changes allowed only on the case path allow-list
    containment:
      localPath: Disposable workspace, controlled configuration, timeout, isolated evidence, and post-run mutation audit without a security-containment claim.
      externalPath: An external VM or equivalent runner enforces filesystem, process, network, and resource containment for an explicitly high-risk case.
      reportedStatus: containment-unverified
      permittedReportedStatuses: [containment-unverified, externally-contained]
      externalAttestationRequiredFor: externally-contained
    digestInputs:
      - fixtureSourceSha256
      - sandboxProfileSha256
      - junieAgentDefinitionSha256
      - toolchainVersionsSha256
