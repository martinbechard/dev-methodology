schema: dev-methodology-technology-detection
version: 2
skill: interface-patterns
kind: domain
label: Interface Patterns
capabilities: [interface-boundary-patterns]
activation:
  anyOf:
  - fileMatch: {glob: "**/*Adapter.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*Bridge.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*Facade.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*adapter_pattern.py", extensions: [.py]}
  - fileMatch: {glob: "**/*bridge_pattern.py", extensions: [.py]}
  - fileMatch: {glob: "**/*facade_pattern.py", extensions: [.py]}
