schema: dev-methodology-technology-detection
version: 1
skill: typescript-strict
kind: technology
label: Strict TypeScript
capabilities:
- strict-type-system
activation:
  fileExtensions:
  - ".ts"
  - ".tsx"
  - ".mts"
  - ".cts"
  contentPatterns:
  - glob: tsconfig*.json
    contains: '"strict": true'
companions:
- typescript-coding
