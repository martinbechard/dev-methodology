schema: dev-methodology-technology-detection
version: 2
skill: typescript-strict
kind: technology
label: Strict TypeScript
capabilities:
- strict-type-system
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileExtension: .ts
      - fileExtension: .tsx
      - fileExtension: .mts
      - fileExtension: .cts
    - contentPattern: {glob: tsconfig*.json, contains: '"strict": true'}
companions:
- typescript-coding
