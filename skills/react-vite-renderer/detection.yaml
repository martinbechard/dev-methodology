schema: dev-methodology-technology-detection
version: 2
skill: react-vite-renderer
kind: technology
label: React renderer with Vite
capabilities:
- client-user-interface
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileExtension: .tsx
      - fileExtension: .jsx
    - anyOf:
      - contentPattern: {glob: package.json, contains: "@vitejs/plugin-react"}
      - contentPattern: {glob: vite.config.*, contains: react}
