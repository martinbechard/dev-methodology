schema: dev-methodology-technology-detection
version: 2
skill: quarkus-testing
kind: technology
label: Quarkus Testing
capabilities:
- application-testing
activation:
  anyOf:
  - allOf:
    - fileMatch: {glob: "**/src/test/**/*.java", extensions: [.java]}
    - anyOf:
      - contentPattern: {glob: pom.xml, contains: quarkus-junit}
      - contentPattern: {glob: build.gradle*, contains: quarkus-junit}
companions:
- quarkus
- junit
