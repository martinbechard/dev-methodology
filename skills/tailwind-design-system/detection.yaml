schema: dev-methodology-technology-detection
version: 2
skill: tailwind-design-system
kind: technology
label: Tailwind design system
capabilities:
- styling-system
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileExtension: .ts
      - fileExtension: .tsx
      - fileExtension: .js
      - fileExtension: .jsx
      - fileExtension: .css
    - anyOf:
      - owningDependency: tailwindcss
      - manifestFile: tailwind.config.*
