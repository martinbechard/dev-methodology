schema: dev-methodology-technology-detection
version: 2
skill: api-routes
kind: technology
label: Application route handlers
capabilities:
- http-api
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileMatch:
          glob: "**/app/api/**/route.*"
          extensions: [.js, .jsx, .ts, .tsx, .mjs, .cjs, .mts, .cts]
      - fileMatch:
          glob: "**/pages/api/**/*"
          extensions: [.js, .jsx, .ts, .tsx, .mjs, .cjs, .mts, .cts]
    - owningDependency: next
