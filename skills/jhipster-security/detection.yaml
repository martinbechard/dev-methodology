schema: dev-methodology-technology-detection
version: 2
skill: jhipster-security
kind: domain
label: JHipster Security
capabilities:
- application-security
activation:
  anyOf:
  - allOf:
    - contentPattern: {glob: .yo-rc.json, contains: '"generator-jhipster"'}
    - anyOf:
      - contentPattern: {glob: pom.xml, contains: spring-boot}
      - contentPattern: {glob: "build.gradle*", contains: org.springframework.boot}
    - anyOf:
      - fileMatch: {glob: "**/SecurityConfiguration.java", extensions: [.java]}
      - fileMatch: {glob: "**/security/**/*.java", extensions: [.java]}
companions:
- jhipster-project
