schema: dev-methodology-technology-detection
version: 2
skill: jhipster-domain-modeling
kind: domain
label: JHipster Domain Modeling
capabilities:
- domain-modeling
activation:
  anyOf:
  - allOf:
    - contentPattern: {glob: .yo-rc.json, contains: '"generator-jhipster"'}
    - anyOf:
      - contentPattern: {glob: pom.xml, contains: spring-boot}
      - contentPattern: {glob: "build.gradle*", contains: org.springframework.boot}
    - anyOf:
      - fileMatch: {glob: "**/*.jdl", extensions: [.jdl]}
      - fileMatch: {glob: "**/*.jh", extensions: [.jh]}
      - fileGlob: "**/.jhipster/*.json"
companions:
- jhipster-project
