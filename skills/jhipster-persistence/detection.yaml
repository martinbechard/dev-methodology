schema: dev-methodology-technology-detection
version: 2
skill: jhipster-persistence
kind: domain
label: JHipster Persistence
capabilities:
- database-migrations
activation:
  anyOf:
  - allOf:
    - anyOf:
      - allOf:
        - owningContentPattern: {glob: .yo-rc.json, contains: '"generator-jhipster"'}
        - owningContentPattern: {glob: .yo-rc.json, contains: '"jhipsterVersion"'}
      - owningDependency: generator-jhipster
      - owningContentPattern: {glob: pom.xml, contains: tech.jhipster}
      - owningContentPattern: {glob: "build.gradle*", contains: tech.jhipster}
    - anyOf:
      - contentPattern: {glob: pom.xml, contains: spring-boot}
      - contentPattern: {glob: "build.gradle*", contains: org.springframework.boot}
    - fileGlob: "**/config/liquibase/master.xml"
companions:
- jhipster-project
- liquibase
