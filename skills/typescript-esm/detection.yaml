schema: dev-methodology-technology-detection
version: 2
skill: typescript-esm
kind: technology
label: TypeScript ECMAScript modules
capabilities:
- module-system
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileExtension: .ts
      - fileExtension: .tsx
      - fileExtension: .mts
      - fileExtension: .cts
    - anyOf:
      - contentPattern: {glob: package.json, contains: '"type": "module"'}
      - contentPattern: {glob: tsconfig*.json, contains: NodeNext}
companions:
- typescript
