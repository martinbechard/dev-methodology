schema: dev-methodology-technology-detection
version: 2
skill: jest
kind: technology
label: Jest
capabilities:
- test-framework
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileExtension: .ts
      - fileExtension: .tsx
      - fileExtension: .js
      - fileExtension: .jsx
      - fileExtension: .mts
      - fileExtension: .cts
      - fileExtension: .mjs
      - fileExtension: .cjs
    - anyOf:
      - owningDependency: jest
      - owningDependency: ts-jest
      - manifestFile: jest.config.*
