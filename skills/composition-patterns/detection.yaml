schema: dev-methodology-technology-detection
version: 2
skill: composition-patterns
kind: domain
label: Composition Patterns
capabilities: [object-composition-patterns]
activation:
  anyOf:
  - fileMatch: {glob: "**/*Composite.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*Decorator.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*Proxy.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*Flyweight.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*composite_pattern.py", extensions: [.py]}
  - fileMatch: {glob: "**/*decorator_pattern.py", extensions: [.py]}
  - fileMatch: {glob: "**/*proxy_pattern.py", extensions: [.py]}
  - fileMatch: {glob: "**/*flyweight_pattern.py", extensions: [.py]}
