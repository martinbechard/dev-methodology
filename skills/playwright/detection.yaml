schema: dev-methodology-technology-detection
version: 2
skill: playwright
kind: technology
label: Playwright
capabilities:
- end-to-end-framework
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileExtension: .ts
      - fileExtension: .tsx
      - fileExtension: .js
      - fileExtension: .jsx
      - fileExtension: .mts
      - fileExtension: .cts
      - fileExtension: .mjs
      - fileExtension: .cjs
    - anyOf:
      - owningDependency: "@playwright/test"
      - owningDependency: playwright
      - manifestFile: playwright.config.*
