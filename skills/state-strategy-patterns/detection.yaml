schema: dev-methodology-technology-detection
version: 2
skill: state-strategy-patterns
kind: domain
label: State And Strategy Patterns
capabilities: [behavior-selection-patterns]
activation:
  anyOf:
  - fileMatch: {glob: "**/*Strategy.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*StatePattern.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*TemplateMethod.*", extensions: [.java, .kt, .cs, .cpp, .h, .hpp, .swift, .ts, .tsx, .py, .rb, .php]}
  - fileMatch: {glob: "**/*strategy_pattern.py", extensions: [.py]}
  - fileMatch: {glob: "**/*state_pattern.py", extensions: [.py]}
  - fileMatch: {glob: "**/*template_method_pattern.py", extensions: [.py]}
