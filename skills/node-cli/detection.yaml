schema: dev-methodology-technology-detection
version: 2
skill: node-cli
kind: technology
label: Node command line application
capabilities:
- command-line-runtime
activation:
  anyOf:
  - allOf:
    - anyOf:
      - fileMatch:
          glob: "**/bin/*"
          extensions: [.js, .mjs, .cjs, .ts, .mts, .cts]
      - fileMatch:
          glob: "**/cli.*"
          extensions: [.js, .mjs, .cjs, .ts, .mts, .cts]
      - fileMatch:
          glob: "**/*-cli.*"
          extensions: [.js, .mjs, .cjs, .ts, .mts, .cts]
      - fileMatch:
          glob: "**/cli-*.*"
          extensions: [.js, .mjs, .cjs, .ts, .mts, .cts]
    - manifestFile: package.json
