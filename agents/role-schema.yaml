schema: dev-methodology-role
version: 2
required:
  - name
  - filename
  - description
  - instructions
  - skills
  - modelProfile
  - outputContract
properties:
  name: slug
  filename: slug
  description: string
  instructions: string
  skills: conditional-skill-entry-list
  dynamicFolderSkills: boolean
  skillAvailability: skill-availability-list
  tools: string-list
  disallowedTools: string-list
  mcpServers: string-list
  modelProfile: model-profile
  modelStages: model-profile-map
  maxTurns: integer
  timeout: integer
  permissionMode: string
  isolation: string
  memory: string
  outputContract: output-entry-list
  examples: role-example-list
fixedBehavior:
  target: local-development
  userInvocable: true
  automaticDelegation: true
excludedProperties:
  - hooks
  - target
  - kind
  - color
  - nickname_candidates
  - metadata
roleGroups:
  - methodology-maintenance
  - project-setup
  - development-use
