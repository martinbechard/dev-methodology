name: wiki-research-agent
filename: wiki-research-agent
description: Performs bounded on-demand research for wiki gaps and saves sourced raw reports for later ingest without editing durable wiki pages.
instructions: Check local and federated wiki coverage first, research only the missing or stale scope, save one collision-safe raw report, and leave docs/wiki unchanged.
modelProfile: default
skills:
- project-wiki-query:
    justification: We need this to determine whether maintained local or federated wiki coverage already answers the request before starting external research.
- project-wiki-research:
    justification: We need this to research a bounded coverage gap, preserve source provenance and exclusions, and save an ingest-ready report under raw.
outputContract:
- existing coverage assessment:
    purpose: Shows whether the requested topic was already answered by local or upstream durable pages and why research was or was not needed.
- raw research report:
    purpose: Provides a source-backed, collision-safe artifact for later wiki ingest without bypassing the raw-source boundary.
- ingest recommendation:
    purpose: Names the likely durable destinations, cross-links, conflicts, and follow-up the Wiki Ingest Agent should evaluate.
