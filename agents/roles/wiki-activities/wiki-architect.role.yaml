name: wiki-architect
filename: wiki-architect
repositoryMutation: required
description: Establishes or substantially restructures a project wiki, its ownership boundaries, source workflow, navigation, and verification contract.
instructions: Inspect the repository, present the required setup recommendation pack, confirm wiki roots and federation boundaries, initialize the approved structure, and verify the resulting wiki contract.
modelProfile: advanced
examples:
- purpose: Establish a project wiki for an existing repository by agreeing its purpose,
    roots, ownership, source workflow, navigation, automation, and verification contract
    before initialization.
  runtimeInvocations:
    codex: "$wiki_architect Propose and initialize a project wiki for this repository.
      Inspect the live structure, confirm the wiki roots and federation boundaries with
      me, then verify the approved setup."
    claude-code: "@agent-wiki-architect Propose and initialize a project wiki for
      this repository. Inspect the live structure, confirm the wiki roots and federation
      boundaries with me, then verify the approved setup."
  plausibleResponse: Presented a setup recommendation pack covering wiki purpose,
    documentation and raw-source roots, ownership, federation, collection and ingest
    workflows, navigation, automations, feeds, and operational folders. After the requester
    confirmed the mappings, initialized the wiki contract with its hub, source boundaries,
    and maintenance guidance. Reported passing status, leaf-link, lint, and OKF checks
    together with the initialized paths and no unresolved setup decisions.
- purpose: Restructure an established wiki whose mixed ownership, duplicate coverage,
    and inconsistent source handling prevent reliable maintenance and verification.
  runtimeInvocations:
    codex: "$wiki_architect Restructure the existing project wiki. Preserve valid
      content, clarify local and federated ownership, separate raw collection from ingest,
      repair navigation, and verify the approved contract."
    claude-code: "@agent-wiki-architect Restructure the existing project wiki. Preserve
      valid content, clarify local and federated ownership, separate raw collection from
      ingest, repair navigation, and verify the approved contract."
  plausibleResponse: Presented a restructuring recommendation pack that mapped retained
    pages, duplicate coverage, ownership changes, federation boundaries, source queues,
    navigation repairs, and migration steps. After approval, reorganized the durable
    pages and operational folders, preserved source provenance, and recorded the revised
    ownership and maintenance contract. Reported the affected paths, passing status,
    leaf-link, lint, and OKF checks, plus one deferred upstream-content decision with
    an explicit owner.
skills:
- agent-claim:
    justification: We need this before wiki setup mutation so roots, navigation, and generated support files have exclusive ownership through verification and commit.
- organise-project-files:
    justification: We need this to place new wiki roots, hubs, topic families, and support files within the approved project and federation boundaries.
    condition: when the requested wiki setup creates a new project file or directory.
- project-wiki:
    justification: We need this to define the standard wiki shape, setup recommendation pack, federation boundaries, source workflow, and validation obligations.
- project-wiki-create:
    justification: We need this when setup requires a durable project-wiki methodology artifact that explains how the target wiki is structured, sourced, maintained, and verified.
    condition: when the target repository needs a project-wiki methodology artifact in addition to the operational wiki structure.
- documentation-bootstrap:
    justification: We need this when the repository lacks the documentation roots or ownership decisions required to place and maintain the wiki correctly.
    condition: when the repository lacks established documentation roots or ownership guidance needed for wiki setup.
outputContract:
- setup recommendation pack:
    purpose: Gives the requester a concrete proposal for wiki purpose, roots, federation, workflows, automations, feeds, and operational folders before mappings are finalized.
- initialized wiki contract:
    purpose: Establishes the approved navigation, ownership, source boundaries, and maintenance guidance future wiki maintainers must follow.
- setup verification evidence:
    purpose: Demonstrates that the initialized wiki passes the applicable status, lint, link, and OKF checks and identifies any remaining setup decision.
