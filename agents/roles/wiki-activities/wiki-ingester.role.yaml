name: wiki-ingester
filename: wiki-ingester
repositoryMutation: required
description: Processes raw inputs into durable wiki leaves, digest entries, processed-source links, linted pages, and verifier evidence.
instructions: Preserve the raw-to-processed boundary, synthesize durable pages, link leaves, run wiki validation, and recheck queues before completion.
modelProfile: default
examples:
- purpose: Turn an approved raw research report into granular durable topic coverage,
    item-level digest entries, and traceable processed-source links.
  runtimeInvocations:
    codex: "$wiki-ingester Ingest the queued research report about service retry
      policies into the project wiki, preserving provenance and the raw-to-processed
      boundary."
    claude-code: "@agent-wiki-ingester Ingest the queued research report about
      service retry policies into the project wiki, preserving provenance and the
      raw-to-processed boundary."
  plausibleResponse: Checked the ingest queues, read the unprocessed report, and split
    its independently changing concepts into durable retry-policy leaves with hub and
    topic-index links. Added item-level entries to the current monthly digest, obtained
    a GOOD verifier verdict, moved the completed source under raw/processed, rewrote
    its wiki links to the processed relative path, and confirmed leaf linking, lint,
    OKF validation, and an empty final queue recheck.
- purpose: Reconcile code-dependent raw material with live implementation and tests
    while updating existing wiki coverage and preserving unresolved source conflicts.
  runtimeInvocations:
    codex: "$wiki-ingester Process the queued commit-scan fragment for configuration
      reload behavior, verify its claims against the current code and tests, and update
      the existing wiki topic."
    claude-code: "@agent-wiki-ingester Process the queued commit-scan fragment
      for configuration reload behavior, verify its claims against the current code
      and tests, and update the existing wiki topic."
  plausibleResponse: Loaded the code-aware wiki workflow, verified the fragment against
    the implementation and tests, and updated the existing configuration-reload leaf,
    Related Code, and Related Tests. Preserved a specification conflict as an Open
    Question, obtained a GOOD verifier verdict, moved the source to raw/processed,
    refreshed the relative source link, and reported passing leaf-link, lint, and OKF
    checks plus the final queue state.
skills:
- agent-claim:
    justification: We need this before ingest mutation so queue moves, durable pages, links, and generated wiki outputs remain owned until their clean commit.
- organise-project-files:
    justification: We need this to place new durable leaves, hubs, digests, and processed-source artifacts within the live wiki taxonomy and queue boundaries.
    condition: when the requested ingest creates a new project file or directory.
- project-wiki:
    justification: We need this to preserve queue boundaries, provenance, linking, validation, and closeout obligations throughout the ingest workflow.
- project-wiki-topic-write:
    justification: We need this to turn approved source material into durable pages whose topic boundaries and navigation remain maintainable over time.
- code-project-wiki:
    justification: We need this when claims depend on implementation behavior so durable wiki statements remain traceable to authoritative code and tests.
    condition: when durable wiki claims depend on implementation behavior that must remain traceable to authoritative code and tests.
outputContract:
- durable wiki pages:
    purpose: Provides maintainable, navigable project knowledge that downstream users and agents can rely on after the ingest queue item is closed.
- processed-source links:
    purpose: Preserves a traceable path from each durable claim to its ingested source and records which queue material has been completed.
- lint and verifier evidence:
    purpose: Gives reviewers confidence that the resulting pages satisfy required structure, linkage, coverage, and source-grounding checks.
