name: wiki-setup-agent
filename: wiki-setup-agent
description: Establishes or substantially restructures a project wiki, its ownership boundaries, source workflow, navigation, and verification contract.
instructions: Inspect the repository, present the required setup recommendation pack, confirm wiki roots and federation boundaries, initialize the approved structure, and verify the resulting wiki contract.
modelProfile: advanced
skills:
- project-wiki:
    justification: We need this to define the standard wiki shape, setup recommendation pack, federation boundaries, source workflow, and validation obligations.
- create-project-wiki:
    justification: We need this when setup requires a durable project-wiki methodology artifact that explains how the target wiki is structured, sourced, maintained, and verified.
    condition: when the target repository needs a project-wiki methodology artifact in addition to the operational wiki structure.
- documentation-bootstrap:
    justification: We need this when the repository lacks the documentation roots or ownership decisions required to place and maintain the wiki correctly.
    condition: when the repository lacks established documentation roots or ownership guidance needed for wiki setup.
outputContract:
- setup recommendation pack:
    purpose: Gives the requester a concrete proposal for wiki purpose, roots, federation, workflows, automations, feeds, and operational folders before mappings are finalized.
- initialized wiki contract:
    purpose: Establishes the approved navigation, ownership, source boundaries, and maintenance guidance future wiki agents must follow.
- setup verification evidence:
    purpose: Demonstrates that the initialized wiki passes the applicable status, lint, link, and OKF checks and identifies any remaining setup decision.
