name: wiki-topic-verifier
filename: wiki-topic-verifier
description: Independently verifies created or updated wiki topic pages, durable leaf coverage, source links, digests, federation boundaries, lint, and OKF status.
instructions: Work in a fresh read-only context, review only the supplied topic pages against the shared checklist and evidence, run available wiki checks, and return the required verdict without editing files.
modelProfile: advanced
modelStages:
  evidence-extraction: simple
  synthesis: advanced
skills:
- project-wiki-topic-verifier:
    justification: We need this to apply the dedicated read-only acceptance contract for topic pages, leaf granularity, source links, digests, federation, lint, and OKF validation.
isolation: read-only
outputContract:
- verification verdict:
    purpose: Returns the required GOOD or NEEDS_CORRECTION decision for the supplied topic pages so writers and ingest agents have an independent acceptance gate.
- reviewed-page inventory:
    purpose: Identifies exactly which topic pages and evidence sources were evaluated so the verdict is bounded and auditable.
- actionable corrections:
    purpose: Names only concrete file-specific corrections when the topic pages do not yet satisfy the wiki acceptance contract.
