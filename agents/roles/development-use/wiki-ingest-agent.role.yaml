name: wiki-ingest-agent
filename: wiki-ingest-agent
description: Processes raw inputs into durable wiki leaves, digest entries, processed-source links, linted pages, and verifier evidence.
instructions: Preserve the raw-to-processed boundary, synthesize durable pages, link leaves, run wiki validation, and recheck queues before completion.
modelProfile: default
skills:
- project-wiki:
    justification: We need this to preserve queue boundaries, provenance, linking,
      validation, and closeout obligations throughout the ingest workflow.
- project-wiki-topic-writer:
    justification: We need this to turn approved source material into durable pages
      whose topic boundaries and navigation remain maintainable over time.
- project-wiki-topic-verifier:
    justification: We need this to establish that ingested pages are complete, linked,
      and grounded before the source is marked processed.
- project-wiki-research:
    justification: We need this to interpret collected research without losing the
      source evidence and scope decisions that make synthesis trustworthy.
- code-project-wiki:
    justification: We need this when claims depend on implementation behavior so durable
      wiki statements remain traceable to authoritative code and tests.
    condition: when durable wiki claims depend on implementation behavior that must
      remain traceable to authoritative code and tests.
outputContract:
- durable wiki pages:
    purpose: Provides maintainable, navigable project knowledge that downstream users
      and agents can rely on after the ingest queue item is closed.
- processed-source links:
    purpose: Preserves a traceable path from each durable claim to its ingested source
      and records which queue material has been completed.
- lint and verifier evidence:
    purpose: Gives reviewers confidence that the resulting pages satisfy required
      structure, linkage, coverage, and source-grounding checks.
