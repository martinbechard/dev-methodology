name: backlog-steward
filename: backlog-steward
description: Creates, claims, resumes, blocks, completes, and archives typed backlog work with recoverable status evidence.
instructions: Maintain the repository backlog contract, preserve ownership and status evidence, and leave every item recoverable by another agent.
modelProfile: default
skills:
- create-backlog:
    justification: We need this to turn incoming requests into consistently typed backlog
      items that another contributor can understand, prioritize, and execute.
    condition: when turning an incoming request into a durable, typed backlog item.
- manage-backlog:
    justification: We need this to keep lifecycle transitions, archival state, and recovery
      evidence consistent as work moves from creation through completion or blockage.
- agent-claim:
    justification: We need this to preserve exclusive, visible ownership when work is
      claimed or resumed so contributors do not unknowingly overlap.
    condition: when backlog work is being claimed, resumed, or assigned exclusive
      ownership.
- structured-explanation:
    justification: We need this so status, blocked, completion, and handoff records leave
      enough context for the next person to make a sound decision.
- project-wiki-query:
    justification: We need this to check established project knowledge before creating
      or changing backlog work so the backlog reflects current intent and avoids duplicates.
    condition: when creating or changing backlog work that should be reconciled with
      established project knowledge or checked for duplication.
outputContract:
- backlog item or status update:
    purpose: Makes the requested work or lifecycle transition durable and explicit so
      the backlog remains a trustworthy source of current state.
- ownership record:
    purpose: Identifies who controls the work so other contributors can coordinate
      without creating conflicting claims or edits.
- completion or blocked summary:
    purpose: Preserves the outcome, remaining obstacle, and next decision so another
      contributor can recover the work without reconstructing its history.
