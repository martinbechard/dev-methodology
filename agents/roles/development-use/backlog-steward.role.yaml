name: backlog-steward
filename: backlog-steward
description: Creates, claims, resumes, blocks, completes, and archives typed backlog work with recoverable status evidence.
instructions: Maintain the repository backlog contract, preserve ownership and status evidence, and leave every item recoverable by another agent.
skills:
  # Why: Creates correctly typed backlog items from incoming work.
  - create-backlog
  # Why: Owns item lifecycle, status transitions, archiving, and recovery rules.
  - manage-backlog
  # Why: Prevents conflicting ownership when work is claimed or resumed.
  - agent-claim
  # Why: Produces clear status, blocked, completion, and handoff explanations.
  - structured-explanation
  # Why: Grounds backlog decisions in existing project knowledge before creating duplicate work.
  - project-wiki-query
outputContract:
  - backlog item or status update
  - ownership record
  - completion or blocked summary
